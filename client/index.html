<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="theme-color" content="#171717" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="LibreChat - An open source chat application with support for multiple AI models" />
    <title>LibreChat</title>
    <link rel="shortcut icon" href="#" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
    
    <!-- React DevTools Integration -->
    <script>
      // React DevTools setup pentru development
      if (process.env.NODE_ENV === 'development' || window.location.hostname === 'localhost') {
        // Conectare React DevTools pentru React DOM
        const devToolsScript = document.createElement('script');
        devToolsScript.src = 'http://localhost:8097';
        devToolsScript.async = true;
        devToolsScript.onerror = function() {
          // Fallback pentru IP local
          const fallbackScript = document.createElement('script');
          fallbackScript.src = 'http://192.168.76.130:8097';
          fallbackScript.async = true;
          document.head.appendChild(fallbackScript);
        };
        document.head.appendChild(devToolsScript);
        
        // Debug utilities pentru console
        window.LibreChatDebug = {
          enableHighlightUpdates: () => {
            if (window.__REACT_DEVTOOLS_GLOBAL_HOOK__) {
              window.__REACT_DEVTOOLS_GLOBAL_HOOK__.settings.highlightUpdates = true;
              console.log('✅ React DevTools: Highlight updates enabled');
            }
          },
          disableHighlightUpdates: () => {
            if (window.__REACT_DEVTOOLS_GLOBAL_HOOK__) {
              window.__REACT_DEVTOOLS_GLOBAL_HOOK__.settings.highlightUpdates = false;
              console.log('❌ React DevTools: Highlight updates disabled');
            }
          },
          inspectComponent: (selector) => {
            const element = document.querySelector(selector);
            if (element && window.__REACT_DEVTOOLS_GLOBAL_HOOK__) {
              window.__REACT_DEVTOOLS_GLOBAL_HOOK__.selectNode(element);
              console.log('🔍 Selected element for inspection:', element);
            }
          }
        };
        
        console.log('🚀 LibreChat Debug Tools loaded!');
        console.log('📋 Available commands:');
        console.log('  - LibreChatDebug.enableHighlightUpdates()');
        console.log('  - LibreChatDebug.disableHighlightUpdates()');
        console.log('  - LibreChatDebug.inspectComponent("selector")');
      }
    </script>
    
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
    </style>
    <script>
      const theme = localStorage.getItem('color-theme');
      const loadingContainerStyle = document.createElement('style');
      let backgroundColor;

      if (theme === 'dark') {
        backgroundColor = '#0d0d0d';
      } else if (theme === 'light') {
        backgroundColor = '#ffffff';
      } else if (theme === 'system') {
        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
        backgroundColor = prefersDarkScheme ? '#0d0d0d' : '#ffffff';
      } else {
        backgroundColor = '#ffffff';
      }

      loadingContainerStyle.innerHTML = `
        #loading-container {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background-color: ${backgroundColor};
        }
      `;
      document.head.appendChild(loadingContainerStyle);
    </script>
    <script defer type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root">
      <div id="loading-container"></div>
    </div>
  </body>
</html>
